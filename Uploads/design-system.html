<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design System — Excel App</title>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — EXCEL APP
   Paleta, componentes e questões
═══════════════════════════════════════════════════ */

:root {
  --green-dark:   #217346;
  --green-mid:    #2E9E5B;
  --green-light:  #E8F5E9;
  --green-vivid:  #27AE60;
  --bg:           #F7F9F7;
  --surface:      #FFFFFF;
  --text:         #1A1A2E;
  --text-sub:     #4A4A6A;
  --border:       #E0E5E0;
  --gray:         #B0BEC5;
  --gray-bg:      #F0F2F0;
  --amber:        #F59E0B;
  --amber-light:  #FEF3C7;
  --red:          #E74C3C;
  --red-light:    #FEE2E2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1f14;
  font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ── Page Layout ── */
.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.page-title {
  text-align: center;
  color: rgba(255,255,255,0.92);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.page-sub {
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  margin-bottom: 36px;
}

/* ── Section ── */
.section { margin-bottom: 48px; }
.section-title {
  color: rgba(255,255,255,0.5);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-left: 2px;
}

/* ── Card shell ── */
.card {
  background: var(--surface);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

/* ── Question Header ── */
.q-header {
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.q-trail {
  color: rgba(255,255,255,0.65);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.q-title {
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  line-height: 1.3;
}
.xp-badge {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 4px 10px;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Question Body ── */
.q-body {
  padding: 16px 16px 0;
}

/* ── Hint bar ── */
.hint-bar {
  margin: 0 16px 10px;
  background: var(--amber-light);
  border: 1px solid var(--amber);
  border-radius: 9px;
  padding: 10px 12px;
  font-size: 12px;
  color: #92400E;
  line-height: 1.6;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

/* ── Options ── */
.options {
  padding: 0 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.option {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  font-family: inherit;
}
.option:hover {
  border-color: var(--green-mid);
  background: var(--green-light);
}
.option.selected {
  border-color: var(--green-mid);
  background: var(--green-light);
  color: var(--green-dark);
  font-weight: 600;
}
.option.correct {
  border-color: var(--green-mid);
  background: var(--green-light);
  color: var(--green-dark);
  font-weight: 600;
}
.option.wrong {
  border-color: var(--red);
  background: var(--red-light);
  color: var(--red);
  font-weight: 600;
}
.option-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 800;
  transition: all 0.15s;
}

/* ── CTA Button ── */
.btn-confirm {
  width: calc(100% - 32px);
  margin: 0 16px 16px;
  padding: 13px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(33,115,70,0.3);
  font-family: inherit;
  transition: opacity 0.15s;
}
.btn-confirm:disabled {
  background: var(--border);
  color: var(--gray);
  box-shadow: none;
  cursor: not-allowed;
}

/* ── Feedback ── */
.feedback {
  margin: 0 16px 16px;
  border-radius: 12px;
  padding: 12px 14px;
}
.feedback.correct {
  background: var(--green-light);
  border: 1px solid var(--green-mid);
}
.feedback.wrong {
  background: var(--red-light);
  border: 1px solid var(--red);
}
.feedback-title {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 4px;
}
.feedback.correct .feedback-title { color: var(--green-dark); }
.feedback.wrong .feedback-title { color: var(--red); }
.feedback-text {
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM DAS QUESTÕES — classes injetadas no
   campo `description` de cada questão via wrapDescription()
═══════════════════════════════════════════════════ */

/* ── Grid Excel ── */
.xl-wrap {
  overflow-x: auto;
  margin-bottom: 12px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.xl-grid {
  border-collapse: collapse;
  font-size: 13px;
  width: 100%;
  font-family: monospace;
}
.xl-grid th {
  background: var(--bg);
  color: var(--text-sub);
  font-weight: 600;
  border: 1px solid var(--border);
  padding: 5px 12px;
  text-align: center;
  font-size: 12px;
}
.xl-grid td {
  border: 1px solid var(--border);
  padding: 5px 12px;
  color: var(--text);
  text-align: right;
  background: var(--surface);
  min-width: 44px;
}
.xl-grid .rh {
  background: var(--bg);
  color: var(--text-sub);
  font-weight: 600;
  text-align: center;
  font-size: 12px;
}
.cell-active {
  background: var(--green-light) !important;
  border: 2px solid var(--green-mid) !important;
  color: var(--green-dark) !important;
  font-weight: 700 !important;
}
.cell-result {
  background: var(--amber-light) !important;
  border: 2px solid var(--amber) !important;
  color: #92400E !important;
  font-weight: 700 !important;
}
.cell-error {
  background: var(--red-light) !important;
  border: 2px solid var(--red) !important;
  color: var(--red) !important;
  font-weight: 700 !important;
}
.cell-text { text-align: left !important; }

/* ── Cards de contexto ── */
.ctx-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.ctx-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.ctx-body {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}

/* ── Comparação Antes/Depois ── */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.compare-bad {
  background: var(--red-light);
  border: 1px solid #FECACA;
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.compare-good {
  background: var(--green-light);
  border: 1px solid #BBF7D0;
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.compare-label-bad {
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.compare-label-good {
  font-size: 10px;
  font-weight: 700;
  color: var(--green-mid);
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.compare-value      { font-size: 22px; font-weight: 800; }
.compare-value.bad  { color: var(--red); }
.compare-value.good { color: var(--green-dark); }
.compare-sub        { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

/* ── Badge de célula ── */
.cell-badge {
  display: inline-block;
  background: var(--green-dark);
  color: #fff;
  font-family: monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 5px;
  margin: 0 2px;
}

/* ── Teclas de teclado ── */
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  box-shadow: 0 2px 0 #d0d5d0;
  margin: 0 3px;
  font-family: monospace;
}
.kbd-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 12px;
}

/* ── Banner Desafio Final ── */
.challenge-banner {
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  color: #fff;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  margin-bottom: 14px;
}
.challenge-icon  { font-size: 26px; margin-bottom: 6px; }
.challenge-title { font-weight: 800; font-size: 15px; }
.challenge-sub   { opacity: 0.75; font-size: 12px; margin-top: 4px; }

/* ── Step list ── */
.step-list { display: flex; flex-direction: column; gap: 6px; }
.step-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
}
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--green-light);
  color: var(--green-dark);
  font-weight: 800;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ── Ícone centralizado ── */
.icon-center        { text-align: center; padding: 12px 0; }
.icon-center .icon  { font-size: 36px; margin-bottom: 8px; }
.icon-center .desc  { font-size: 13px; color: var(--text-sub); }

/* ── Grid 2 colunas (stats) ── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.stat-value { font-size: 20px; font-weight: 800; color: var(--text); }
.stat-label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

/* ── Navegação entre questões ── */
.nav-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.nav-btn:hover, .nav-btn.active {
  background: var(--green-mid);
  border-color: var(--green-mid);
  color: #fff;
}
.nav-arrow {
  padding: 9px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.nav-arrow.primary {
  background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
  border: none;
  color: #fff;
  box-shadow: 0 4px 14px rgba(33,115,70,0.3);
}
.nav-counter {
  color: rgba(255,255,255,0.25);
  font-size: 11px;
  text-align: center;
  margin-top: 12px;
}
</style>
</head>
<body>

<div class="page">
  <div class="page-title">Design System — Excel App</div>
  <div class="page-sub">Paleta verde · Questões padronizadas · Identidade coesa</div>

  <!-- Nav buttons -->
  <div class="nav-row" id="navRow"></div>

  <!-- Question container -->
  <div id="questionContainer"></div>

  <!-- Nav arrows -->
  <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;">
    <button class="nav-arrow" id="btnPrev" onclick="navigate(-1)">← Anterior</button>
    <button class="nav-arrow primary" id="btnNext" onclick="navigate(1)">Próxima →</button>
  </div>
  <div class="nav-counter" id="counter"></div>
</div>

// ═══════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════

let current = 0;
let selected = null;
let revealed = false;

function render() {
  const q = questions[current];
  const container = document.getElementById('questionContainer');
  const hasOptions = q.options.length > 0;

  container.innerHTML = `
    <div class="card">
      <div class="q-header">
        <div>
          <div class="q-trail">${q.trail}</div>
          <div class="q-title">${q.title}</div>
        </div>
        <div class="xp-badge">+${q.xp} XP</div>
      </div>

      <div class="q-body">${q.description}</div>

      <div class="hint-bar" id="hintBar" style="display:none">
        💡 ${q.hint}
      </div>

      <div style="margin:0 16px 10px">
        <button onclick="toggleHint()" style="
          width:100%;padding:8px;background:var(--amber-light);
          border:1px solid var(--amber);border-radius:9px;cursor:pointer;
          font-size:12px;color:#92400E;font-weight:600;
          display:flex;align-items:center;gap:6px;font-family:inherit;
        " id="hintBtn">
          <span>💡</span><span>Ver dica</span>
        </button>
      </div>

      ${hasOptions ? `
      <div class="options" id="optionsList">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="selectOption(${i})" id="opt${i}">
            <div class="option-dot" id="dot${i}"></div>
            ${opt}
          </button>
        `).join('')}
      </div>

      <div id="feedbackArea"></div>

      <button class="btn-confirm" id="btnConfirm" onclick="confirm()" disabled>
        Confirmar resposta
      </button>
      ` : `
      <div style="padding:0 16px 16px">
        <div class="feedback correct">
          <div class="feedback-title">✓ Exercício de ordenação</div>
          <div class="feedback-text">${q.explanation}</div>
        </div>
      </div>
      `}
    </div>
  `;

  // Nav buttons
  const navRow = document.getElementById('navRow');
  navRow.innerHTML = questions.map((_, i) => `
    <button class="nav-btn ${i === current ? 'active' : ''}" onclick="goTo(${i})">Q${i+1}</button>
  `).join('');

  document.getElementById('counter').textContent = `${current + 1} de ${questions.length} questões`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === questions.length - 1;
  document.getElementById('btnPrev').style.opacity = current === 0 ? '0.3' : '1';
  document.getElementById('btnNext').style.opacity = current === questions.length - 1 ? '0.3' : '1';

  selected = null;
  revealed = false;
}

function toggleHint() {
  const bar = document.getElementById('hintBar');
  const btn = document.getElementById('hintBtn');
  const showing = bar.style.display !== 'none';
  bar.style.display = showing ? 'none' : 'flex';
  btn.querySelector('span:last-child').textContent = showing ? 'Ver dica' : 'Ocultar dica';
}

function selectOption(i) {
  if (revealed) return;
  selected = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.className = 'option' + (idx === i ? ' selected' : '');
    document.getElementById(`dot${idx}`).textContent = '';
    document.getElementById(`dot${idx}`).style.background = 'transparent';
  });
  document.getElementById(`opt${i}`).querySelector('.option-dot').style.background = 'var(--green-mid)';
  document.getElementById('btnConfirm').disabled = false;
}

function confirm() {
  if (selected === null || revealed) return;
  revealed = true;
  const q = questions[current];
  const isCorrect = selected === q.correct;

  document.querySelectorAll('.option').forEach((el, i) => {
    if (i === q.correct) {
      el.className = 'option correct';
      document.getElementById(`dot${i}`).textContent = '✓';
      document.getElementById(`dot${i}`).style.background = 'var(--green-mid)';
      document.getElementById(`dot${i}`).style.color = '#fff';
    } else if (i === selected && !isCorrect) {
      el.className = 'option wrong';
      document.getElementById(`dot${i}`).textContent = '✗';
      document.getElementById(`dot${i}`).style.background = 'transparent';
      document.getElementById(`dot${i}`).style.color = 'var(--red)';
    }
  });

  document.getElementById('feedbackArea').innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'wrong'}" style="margin:0 16px 10px">
      <div class="feedback-title">${isCorrect ? '✓ Correto!' : '✗ Não foi dessa vez'}</div>
      <div class="feedback-text">${q.explanation}</div>
    </div>
  `;

  document.getElementById('btnConfirm').style.display = 'none';
}

function goTo(i) {
  current = i;
  render();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < questions.length) {
    current = next;
    render();
  }
}

render();
</script>
